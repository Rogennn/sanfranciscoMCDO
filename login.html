<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - MCDO San Francisco</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --maroon:#6b0000;
    --maroon-dark:#4a0000;
    --light:#f7f7f7;
    --text:#333;
}

*{
    box-sizing:border-box;
}

body{
    font-family:'Source Sans 3',sans-serif;
    margin:0;
    background:linear-gradient(135deg, #f2f2f2 0%, #e0e0e0 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* HEADER */

.gov-header{
    background:var(--maroon);
    padding:10px 0;
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;
}

.seal-img{
    width:70px;
    height:70px;
    border-radius:50%;
    object-fit:cover;
}

.gov-text{
    color:white;
    line-height:1.3;
}

.line1{
    font-size:.75rem;
}

.line2{
    font-size:.9rem;
    font-weight:600;
}

.line3{
    font-size:1.3rem;
    font-family:'Playfair Display',serif;
    font-weight:700;
}

/* LOGIN CARD */

.login-container{
    margin-top:120px;
    margin-bottom:40px;
}

.login-card{
    background:white;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
    padding:50px;
    max-width:450px;
    margin:0 auto;
    position:relative;
    overflow:hidden;
}

.login-card::before{
    content:'';
    position:absolute;
    top:0;
    right:0;
    width:150px;
    height:150px;
    background:linear-gradient(135deg,var(--maroon) 0%,rgba(107,0,0,0.1) 100%);
    border-radius:0 0 0 20px;
    opacity:0.1;
}

.login-header{
    text-align:center;
    margin-bottom:40px;
}

.login-header i{
    font-size:3rem;
    color:var(--maroon);
    margin-bottom:20px;
}

.login-header h2{
    color:var(--maroon);
    font-weight:700;
    font-family:'Playfair Display',serif;
    margin-bottom:10px;
}

.login-header p{
    color:#666;
    font-size:0.95rem;
}

.form-label{
    color:var(--text);
    font-weight:600;
    margin-bottom:8px;
}

.form-control{
    padding:12px 15px;
    border:2px solid #e0e0e0;
    border-radius:10px;
    font-size:0.95rem;
    transition:all 0.3s ease;
}

.form-control:focus{
    border-color:var(--maroon);
    box-shadow:0 0 0 3px rgba(107,0,0,0.1);
}

.login-btn{
    background:var(--maroon);
    color:white;
    padding:14px 30px;
    border-radius:10px;
    border:none;
    font-weight:700;
    font-size:1rem;
    width:100%;
    transition:all 0.3s ease;
    margin-top:10px;
}

.login-btn:hover{
    background:var(--maroon-dark);
    color:white;
    transform:translateY(-2px);
    box-shadow:0 5px 20px rgba(107,0,0,0.3);
}

.back-link{
    text-align:center;
    margin-top:25px;
}

.back-link a{
    color:var(--maroon);
    text-decoration:none;
    font-weight:600;
    transition:all 0.3s ease;
}

.back-link a:hover{
    color:var(--maroon-dark);
    text-decoration:underline;
}

.alert{
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
}

/* RESPONSIVE */

@media(max-width:768px){

.login-card{
    padding:35px 25px;
    margin:0 20px;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<header class="gov-header">
<div class="container">
<div class="d-flex align-items-center gap-3">

<img src="sfq-logo.jpg" class="seal-img">

<div class="gov-text">
<div class="line1">REPUBLIC OF THE PHILIPPINES</div>
<div class="line2">PROVINCE OF QUEZON</div>
<div class="line3">MUNICIPALITY OF SAN FRANCISCO</div>
</div>

</div>
</div>
</header>

<!-- LOGIN CARD -->

<div class="login-container">
<div class="login-card">

<div class="login-header">
<i class="fas fa-user-shield"></i>
<h2 id="cardTitle">Admin Portal Access</h2>
<p id="cardSubtitle">Municipal Cooperatives Development Office</p>
</div>

<!-- STEP 1: SECURITY GATE ONLY (Password verification) -->
<div id="securityGate" style="display: block;">
<form id="securityForm" onsubmit="verifySecurity(event)">
<div id="securityAlert"></div>
<p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">
<i class="fas fa-lock me-2" style="color: var(--maroon);"></i>
<strong>Security Verification Required</strong><br>
Enter the admin access password to proceed to the admin dashboard.
</p>
<div class="mb-4">
<label for="accessPassword" class="form-label">Admin Access Password</label>
<div class="input-group">
<span class="input-group-text" style="border:2px solid #e0e0e0;border-right:none;background:#f8f9fa;">
<i class="fas fa-key" style="color:var(--maroon);"></i>
</span>
<input type="password" class="form-control" id="accessPassword" placeholder="Enter access password" required style="border-left:none;">
</div>
</div>
<button type="submit" class="login-btn">
<i class="fas fa-check-circle me-2"></i>Verify Access
</button>
</form>
</div>

<div class="back-link">
<a href="index.html">
<i class="fas fa-arrow-left me-2"></i>Back to Home
</a>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// SECURITY GATE - Verify access password and redirect to admin dashboard
function verifySecurity(event) {
    event.preventDefault();
    
    const accessPassword = document.getElementById('accessPassword').value.trim();
    const securityAlert = document.getElementById('securityAlert');
    const correctPassword = 'mcdomarian2026';
    
    securityAlert.innerHTML = '';
    
    if (accessPassword === correctPassword) {
        // Correct password - set flag and redirect to admin dashboard
        localStorage.setItem('accessVerified', 'true');
        securityAlert.innerHTML = `
            <div class="alert alert-success">
                <i class="fas fa-check-circle me-2"></i>Access verified! Redirecting to admin dashboard...
            </div>
        `;
        
        setTimeout(() => {
            window.location.href = 'admin.html';
        }, 1000);
    } else {
        // Wrong password
        securityAlert.innerHTML = `
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle me-2"></i>
                <strong>Access Denied!</strong> Invalid access password. Try again.
            </div>
        `;
        document.getElementById('accessPassword').value = '';
        document.getElementById('accessPassword').focus();
    }
}

// Check if already verified
window.onload = function() {
    console.log('Checking access verification...');
    const isVerified = localStorage.getItem('accessVerified');
    
    if (isVerified === 'true') {
        console.log('User already verified, redirecting to admin.html');
        window.location.href = 'admin.html';
    }
};
</script>

</body>
</html>
