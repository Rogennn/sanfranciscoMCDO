services:
  - type: web
    name: mcdo-sanfrancisco
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mcdo-db
          property: connectionString

databases:
  - name: mcdo-db
    databaseName: mcdo_db
    user: mcdo_user
