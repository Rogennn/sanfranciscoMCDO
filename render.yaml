services:
  - type: web
    name: mcdo-sanfrancisco
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: RENDER
        value: "true"
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1
